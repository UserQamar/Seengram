name: Build SeenGram From Source

on:
  workflow_dispatch:
    inputs:
      instagram_url:
       description: "Decrypted Instagram IPA Link"
       required: false
       default: "https://www.mediafire.com/file/cdskpootmye2ye1/Instagram.ipa/file"
       type: string

jobs:
  build:
    runs-on: macos-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4
      with:
       submodules: recursive

    - name: Install dependencies
      run: |
        brew untap aws/tap || true
        brew install dpkg
        brew install ldid

    - name: Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "Theos commit:"
        git -C $HOME/theos rev-parse HEAD
        echo "Logos:"
        $HOME/theos/bin/logos.pl --version || true

    - name: Install iOS SDK
      run: |
       git clone https://github.com/xybp888/iOS-SDKs.git
        cp -R iOS-SDKs/iPhoneOS16.2.sdk $HOME/theos/sdks/

    - name: Install IPA tools
      run: |
        pip install --force-reinstall https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

        mkdir -p $HOME/.local/bin

        curl -L \
        https://github.com/asdfzxcvbn/ipapatch/releases/download/v2.1.3/ipapatch.macos-arm64 \
        -o $HOME/.local/bin/ipapatch

        chmod +x $HOME/.local/bin/ipapatch

        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Download Instagram IPA
      run: |
        mkdir -p packages

        curl -L \
        "${{ inputs.instagram_url }}" \
        -o packages/com.burbn.instagram.ipa

    - name: Build SeenGram
      run: |
       chmod +x build.sh
       export MAKEFLAGS="-k"
       export THEOS_BUILD_DIR="$PWD/.theos"
       ./build.sh sideload V=1 -j1
      continue-on-error: true

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: SeenGram-custom
        path: |
          packages/*.ipa