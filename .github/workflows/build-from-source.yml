name: Build SeenGram From Source

on:
  workflow_dispatch:
    inputs:
      instagram_url:
        description: "Direct URL to decrypted Instagram IPA"
        required: true
        type: string

jobs:
  build:
    runs-on: macos-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install dpkg

    - name: Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV

    - name: Install IPA tools
      run: |
        pip install --force-reinstall https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

        mkdir -p $HOME/.local/bin

        curl -L \
        https://github.com/asdfzxcvbn/ipapatch/releases/download/v2.1.3/ipapatch.macos-arm64 \
        -o $HOME/.local/bin/ipapatch

        chmod +x $HOME/.local/bin/ipapatch

        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Download Instagram IPA
      run: |
        mkdir -p packages

        curl -L \
        "${{ inputs.instagram_url }}" \
        -o packages/com.burbn.instagram.ipa

    - name: Build RyukGram
      run: |
        chmod +x build.sh
        ./build.sh sideload

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: RyukGram-custom
        path: |
          packages/*.ipa